# Backend CI — 代码质量检查与 Docker 构建
# 触发条件：PR 到 main / Push 到 main
name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # 代码质量检查：ruff、mypy、pytest
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      APP_NAME: backend
      ENVIRONMENT: test
      LOG_LEVEL: DEBUG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff (代码规范检查)
        run: uv run ruff check .

      - name: Run mypy (静态类型检查)
        run: uv run mypy src

      - name: Run pytest (单元测试)
        run: uv run pytest

  # Docker 构建验证
  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker image
        run: docker build -t backend:ci .

      - name: Smoke test Docker image
        run: |
          set -e
          docker run --rm -d --name backend-ci -p 18000:8000 backend:ci
          trap 'docker rm -f backend-ci >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs backend-ci
          exit 1
