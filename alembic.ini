[alembic]
# 迁移脚本存放目录
script_location = alembic
prepend_sys_path = .
path_separator = os

# 数据库连接 URL（会被 env.py 中的配置覆盖）
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/backend

[post_write_hooks]

# ==================== 日志配置 ====================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# 根日志器：默认 WARNING 级别
[logger_root]
level = WARNING
handlers = console
qualname =

# SQLAlchemy 引擎日志：仅输出警告以上
[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

# Alembic 迁移日志：INFO 级别跟踪迁移操作
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# 控制台处理器
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# 通用日志格式
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
