[alembic]
# 迁移脚本存放目录
script_location = alembic
prepend_sys_path = .
path_separator = os

# 数据库连接 URL（会被 env.py 中的配置覆盖）
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/backend

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
